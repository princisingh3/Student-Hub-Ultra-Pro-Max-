<div class="container">

    <!-- Notes -->
    <div class="card">
        <h3>📝 NotesPad</h3>
        <textarea id="notes" rows="6" placeholder="Write your notes here..."></textarea>
        <button onclick="localStorage.setItem('notes',document.getElementById('notes').value)">
            Save Notes
        </button>
    </div>

    <!-- Todo -->
    <div class="card">
        <h3>✅ To-Do Manager</h3>

        <input type="text" id="taskInput" placeholder="Enter Task">

        <button onclick="addTask()">Add Task</button>

        <ul id="taskList"></ul>
    </div>

    <!-- Attendance -->
    <div class="card">
        <h3>📊 Attendance Calculator</h3>

        <input type="number" id="attended" placeholder="Classes Attended">

        <input type="number" id="total" placeholder="Total Classes">

        <button onclick="calculateAttendance()">
            Calculate
        </button>

        <p id="attendanceResult"></p>
    </div>

    <!-- CGPA -->
    <div class="card">
        <h3>🎓 CGPA Calculator</h3>

        <input type="number" id="cgpaInput"
               placeholder="Enter Percentage">

        <button onclick="calculateCGPA()">
            Calculate CGPA
        </button>

        <p id="cgpaResult"></p>
    </div>

    <!-- Pomodoro -->
    <div class="card">
        <h3>⏱️ Pomodoro Timer</h3>

        <h2 id="timer">25:00</h2>

        <button onclick="startTimer()">
            Start Timer
        </button>
    </div>

    <!-- Exam Countdown -->
    <div class="card">
        <h3>📅 Exam Countdown</h3>

        <input type="date" id="examDate">

        <button onclick="countdown()">
            Calculate
        </button>

        <p id="result"></p>
    </div>

    <!-- Dashboard -->
    <div class="card">
        <h3>📈 Progress Dashboard</h3>

        <p>Total Features</p>

        <h2>6+</h2>

        <p>Ultra Pro Max Edition</p>
    </div>

    <!-- Study Planner -->
    <div class="card">
        <h3>📚 Study Planner</h3>

        <input type="text"
               placeholder="Today's Study Goal">

        <button>
            Save Goal
        </button>
    </div>

</div>
